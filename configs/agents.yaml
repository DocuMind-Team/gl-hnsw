runtime_mode: deepagents
sandbox_enabled: false
skills_root: .deepagents/skills
memory_files:
  - .deepagents/AGENTS.md
self_update_mode: controlled
self_update_allowlist:
  - .deepagents/AGENTS.md
  - .deepagents/skills/*/references/*.md
planner_enabled: true
counterevidence_enabled: true
enable_supervisor_delegation: true
enable_anchor_task_delegation: true
max_parallel_tasks: 4
task_iteration_cap: 2
live_reasoning:
  enable_scout_thinking: true
  enable_judge_thinking: true
  enable_reviewer_thinking: true
  enable_curator_thinking: true
subagents:
  index_planner:
    enabled: true
    skills:
      - anchor-planning
      - corpus-adaptation
      - delegation-policy
    tool_scopes:
      - read_doc_brief
      - load_anchor_memory
      - read_graph_stats
      - read_semantic_memory
      - read_execution_manifest
      - audit_anchor_execution
    description: Plan offline indexing batches, anchor order, and coverage budgets.
    system_prompt: You plan offline indexing work. Prioritize coverage, bridge potential, and reusable retrieval utility.
  doc_profiler:
    enabled: true
    skills:
      - doc-briefing
      - entity-canonicalization
    tool_scopes:
      - read_doc_full
      - read_doc_brief
    description: Build anchor dossiers and normalize profile information for offline indexing.
    system_prompt: You build concise structured dossiers for documents and anchors.
  corpus_scout:
    enabled: true
    skills:
      - candidate-expansion
      - evidence-bundling
    tool_scopes:
      - read_doc_brief
      - search_summaries
      - lookup_entities
      - get_hnsw_neighbors
      - read_anchor_dossier
      - compute_topic_consistency
      - compute_bridge_gain
    description: Expand and bundle candidate documents for an anchor.
    system_prompt: You gather high-utility candidate documents and package the supporting evidence bundle.
  relation_judge:
    enabled: true
    skills:
      - relation-judging
      - signal-fusion
    tool_scopes:
      - read_anchor_dossier
      - read_candidate_bundle
      - compute_topic_consistency
      - compute_contrast_evidence
    description: Judge candidate relations using dossiers, evidence bundles, and local signals.
    system_prompt: You judge durable retrieval edges with precision-first reasoning grounded in local signals.
  counterevidence_checker:
    enabled: true
    skills:
      - counterevidence-check
      - graph-hygiene
      - execution-audit
    tool_scopes:
      - read_candidate_bundle
      - read_judgment_bundle
      - read_failure_patterns
      - read_execution_manifest
      - audit_anchor_execution
      - compute_duplicate_risk
      - compute_topic_consistency
      - compute_contrast_evidence
    description: Check tentative edges for duplication, weak direction, and low-utility drift.
    system_prompt: You look for counterevidence and generic failure modes before an edge can survive.
  edge_reviewer:
    enabled: true
    skills:
      - edge-utility-review
      - graph-hygiene
      - metric-evaluation
    tool_scopes:
      - read_candidate_bundle
      - read_judgment_bundle
      - read_counterevidence_bundle
      - evaluate_anchor_utility
      - compute_bridge_gain
      - compute_query_activation_profile
    description: Review candidate edges for utility, risk, and graph hygiene.
    system_prompt: You keep only durable high-utility edges that are likely to improve retrieval quality.
  memory_curator:
    enabled: true
    skills:
      - memory-summarization
      - memory-update
    tool_scopes:
      - read_anchor_dossier
      - read_review_bundle
      - read_failure_patterns
    description: Summarize accepted and rejected patterns into controlled memory updates.
    system_prompt: You summarize learnings and propose memory updates without editing protected code or configs.
